name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Run adapter tests
        run: python -m unittest discover -s tests -p "test_*adapter.py"

      - name: Run bundled command_repo smoke benchmark
        run: |
          evo-harness run \
            --adapter command_repo \
            --repo examples/command_repo_demo/repo \
            --adapter-config examples/command_repo_demo/adapter.json \
            --population-size 1 \
            --workers 1 \
            --gpus 0 \
            --max-generations 0 \
            --run-name ci-command-repo-smoke
